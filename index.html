<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Video Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="room-info" style="display:none;">
        <span>Room Code: <b id="current-room-id"></b></span>
        <button id="copy-btn" onclick="copyRoomCode()">Copy Code</button>
    </div>

    <div id="setup">
        <div class="setup-box">
            <h2>Video Meeting</h2>
            <input type="text" id="room-input" class="custom-input" placeholder="Enter Room Code">
            <div class="button-group">
                <button onclick="createRoom()">Create Room</button>
                <button onclick="joinRoom()">Join Room</button>
            </div>
        </div>
    </div>

    <div id="video-grid">
        <div class="video-container" id="local-container">
            <button class="pin-btn" onclick="togglePin('local-container')">📌</button>
            <video id="local-video" autoplay muted playsinline class="active"></video>
        </div>
    </div>

    <div class="controls">
        <button id="mute-btn" onclick="toggleAudio()">Mute</button>
        <button id="video-btn" onclick="toggleVideo()">Stop Video</button>
        <button id="share-btn" onclick="shareScreen()">Share Screen</button>
        <button id="stop-share-btn" onclick="stopSharing()" style="display:none; background:#ff9800;">Stop Sharing</button>
        <button id="leave-btn" onclick="leaveRoom()" style="background: #ff4747;">Leave</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
