<!DOCTYPE html>
<html>
<head>
    <title>Chill Video Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup">
    <input type="text" id="room-input" placeholder="Room Code">
    <button onclick="createRoom()">Create Room</button>
    <button onclick="joinRoom()">Join Room</button>
</div>

<div id="video-grid">
    <video id="local-video" autoplay muted playsinline></video>
</div>
</div>

    <div id="video-grid">
        <video id="local-video" autoplay muted></video>
    </div>

   <div class="controls">
    <button id="mute-btn" onclick="toggleAudio()">Mute</button>
    <button id="video-btn" onclick="toggleVideo()">Stop Video</button>
    <button id="share-btn" onclick="shareScreen()">Share Screen</button>
    <button id="leave-btn" onclick="leaveRoom()" style="background:red;">Leave Room</button>
</div>

    <script src="script.js"></script>
</body>
</html>
