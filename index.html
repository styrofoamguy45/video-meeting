<!DOCTYPE html>
<html>
<head>
    <title>Chill Video Call</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div id="setup">
    <div class="setup-box">
        <div class="action-section">
            <h3>Start a Meeting</h3>
            <button id="create-btn" onclick="createRoom()">Create Random Room</button>
            <p id="room-display" style="display:none;">Room Code: <b id="generated-code"></b></p>
        </div>

        <hr>

        <div class="action-section">
            <h3>Join a Meeting</h3>
            <input type="text" id="room-input" placeholder="Enter Room Code">
            <button id="join-btn" onclick="joinRoom()">Join Room</button>
        </div>
    </div>
</div>

    <div id="video-grid">
        <video id="local-video" autoplay muted></video>
    </div>

    <div class="controls">
        <button id="mute-btn" onclick="toggleAudio()">Mute</button>
        <button id="video-btn" onclick="toggleVideo()">Stop Video</button>
        <button id="share-btn" onclick="shareScreen()">Share Screen</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
