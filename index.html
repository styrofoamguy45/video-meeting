<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Video Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="room-info" style="display:none;">
        <span>Room: <b id="current-room-id"></b></span>
        <button class="icon-btn" onclick="copyRoomCode()">
            <img src="icon-copy.png" alt="Copy" id="copy-icon">
        </button>
    </div>

    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h2>Join Meeting</h2>
            <input type="text" id="room-input" class="custom-input" placeholder="Room Code">
            <div class="modal-buttons">
                <button class="action-btn" onclick="createRoom()">Create</button>
                <button class="action-btn" onclick="joinRoom()">Join</button>
            </div>
        </div>
    </div>

    <div id="video-grid">
        <div class="video-container" id="local-container">
            <button class="pin-btn" onclick="togglePin('local-container')">📌</button>
            <video id="local-video" autoplay muted playsinline class="active"></video>
        </div>
    </div>

    <div class="controls">
        <button class="icon-btn" onclick="toggleAudio()" title="Mute/Unmute">
            <img src="icon-mute.png" id="mute-icon" alt="Mute">
        </button>
        <button class="icon-btn" onclick="toggleVideo()" title="Camera On/Off">
            <img src="icon-video.png" id="video-icon" alt="Video">
        </button>
        <button class="icon-btn" onclick="shareScreen()" id="share-btn" title="Share Screen">
            <img src="icon-share.png" alt="Share">
        </button>
        <button class="icon-btn" onclick="stopSharing()" id="stop-share-btn" style="display:none;" title="Stop Sharing">
            <img src="icon-stop.png" alt="Stop">
        </button>
        <button class="icon-btn leave-btn" onclick="leaveRoom()" title="Leave">
            <img src="icon-leave.png" alt="Leave">
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
