<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chill Video Call</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="room-info" style="display:none;">
        <span>Room: <b id="current-room-id"></b></span>
        <button class="icon-btn small" onclick="copyRoomCode()">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
                <path stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 4h3a1 1 0 0 1 1 1v15a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h3m2 3h6M9 19h6M9 15h6M9 11h6m-7-7h4a1 1 0 0 1 1 1v1a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1Z"/>
            </svg>
        </button>
        <span id="copy-toast">Copied!</span>
    </div>

    <div id="setup-modal" class="modal">
        <div class="modal-content">
            <h2>Meeting Setup</h2>
            <input type="text" id="room-input" class="custom-input" placeholder="Enter Room Code">
            <div class="modal-buttons">
                <button class="action-btn" onclick="createRoom()">Create Room</button>
                <button class="action-btn" onclick="joinRoom()">Join Room</button>
            </div>
        </div>
    </div>

    <div id="video-grid">
        <div class="video-container" id="local-container">
            <button class="pin-btn" onclick="togglePin('local-container')">📌</button>
            <video id="local-video" autoplay muted playsinline></video>
        </div>
    </div>

    <div class="controls">
        <button class="icon-btn" onclick="toggleAudio()" title="Mute/Unmute">
            <span id="mute-icon-container">
                <svg width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9v3a5.006 5.006 0 0 1-5 5h-4a5.006 5.006 0 0 1-5-5V9m7 9v3m-3 0h6M11 3h2a3 3 0 0 1 3 3v5a3 3 0 0 1-3 3h-2a3 3 0 0 1-3-3V6a3 3 0 0 1 3-3Z"/></svg>
            </span>
        </button>

        <button class="icon-btn" onclick="toggleVideo()" title="Camera On/Off">
            <span id="video-icon-container">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M7.5 4.586A2 2 0 0 1 8.914 4h6.172a2 2 0 0 1 1.414.586L17.914 6H19a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h1.086L7.5 4.586ZM10 12a2 2 0 1 1 4 0 2 2 0 0 1-4 0Zm2-4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z" clip-rule="evenodd"/></svg>
            </span>
        </button>

        <button class="icon-btn" onclick="shareScreen()" id="share-btn">
            <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M14 7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7Zm2 9.387 4.684 1.562A1 1 0 0 0 22 17V7a1 1 0 0 0-1.316-.949L16 7.613v8.774Z" clip-rule="evenodd"/></svg>
        </button>

        <button class="icon-btn" onclick="stopSharing()" id="stop-share-btn" style="display:none; background: #ff9800;">
            <svg width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 6H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1Zm7 11-6-2V9l6-2v10Z"/></svg>
        </button>

        <button class="icon-btn leave-btn" onclick="leaveRoom()">
            <svg width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="black" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H8m12 0-4 4m4-4-4-4M9 4H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h2"/></svg>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
